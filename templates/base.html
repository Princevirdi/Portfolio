{% load static %}
<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Portfolio{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260320-1" />
    <script defer src="{% static 'js/script.js' %}"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="brand" aria-label="Website name">PORTFOLIO</div>

      <nav class="site-nav" aria-label="Primary">
        <a href="{% url 'home' %}">About</a>
        <a href="{% url 'resume' %}">Resume</a>
        <a href="{% url 'portfolio' %}">Portfolio</a>
        <a href="{% url 'contact' %}">Contact</a>
      </nav>

      <button class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
        <span class="icon icon-moon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 14.5A9 9 0 1 1 9.5 3a7 7 0 0 0 11.5 11.5Z" />
          </svg>
        </span>
        <span class="icon icon-sun" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
          </svg>
        </span>
      </button>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-details">
          <a class="footer-name" href="{% url 'contact' %}">PRINCE VIRDI</a>
